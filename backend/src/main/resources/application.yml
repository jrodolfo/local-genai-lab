spring:
  application:
    name: llm-pet-project-backend

server:
  port: 8080

app:
  model:
    provider: ${APP_MODEL_PROVIDER:ollama}
  tools:
    routing-mode: ${APP_TOOLS_ROUTING_MODE:hybrid}
    log-planner: ${APP_TOOLS_LOG_PLANNER:false}
  storage:
    sessions-directory: ${APP_STORAGE_SESSIONS_DIRECTORY:../data/sessions}
    reports-directory: ${APP_STORAGE_REPORTS_DIRECTORY:../scripts/reports}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  default-model: ${OLLAMA_DEFAULT_MODEL:llama3:8b}
  connect-timeout-seconds: ${OLLAMA_CONNECT_TIMEOUT_SECONDS:10}
  read-timeout-seconds: ${OLLAMA_READ_TIMEOUT_SECONDS:240}

bedrock:
  region: ${BEDROCK_REGION:us-east-1}
  model-id: ${BEDROCK_MODEL_ID:}

mcp:
  enabled: ${MCP_ENABLED:false}
  command: ${MCP_COMMAND:node}
  args:
    - ${MCP_ARG_1:dist/index.js}
  working-directory: ${MCP_WORKING_DIRECTORY:../mcp}
  startup-timeout-seconds: ${MCP_STARTUP_TIMEOUT_SECONDS:10}
  tool-timeout-seconds: ${MCP_TOOL_TIMEOUT_SECONDS:120}
