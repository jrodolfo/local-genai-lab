spring:
  application:
    name: local-genai-lab-backend

server:
  port: 8080

management:
  endpoints:
    web:
      discovery:
        enabled: false
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: false

app:
  model:
    provider: ${APP_MODEL_PROVIDER:ollama}
  tools:
    routing-mode: ${APP_TOOLS_ROUTING_MODE:hybrid}
    log-planner: ${APP_TOOLS_LOG_PLANNER:false}
  storage:
    sessions-directory: ${APP_STORAGE_SESSIONS_DIRECTORY:data/sessions}
    reports-directory: ${APP_STORAGE_REPORTS_DIRECTORY:scripts/reports}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  default-model: ${OLLAMA_DEFAULT_MODEL:llama3:8b}
  connect-timeout-seconds: ${OLLAMA_CONNECT_TIMEOUT_SECONDS:10}
  read-timeout-seconds: ${OLLAMA_READ_TIMEOUT_SECONDS:240}

bedrock:
  region: ${BEDROCK_REGION:us-east-2}
  model-id: ${BEDROCK_MODEL_ID:}

huggingface:
  base-url: ${HUGGINGFACE_BASE_URL:https://router.huggingface.co/v1/chat/completions}
  api-token: ${HUGGINGFACE_API_TOKEN:}
  default-model: ${HUGGINGFACE_DEFAULT_MODEL:}
  models: ${HUGGINGFACE_MODELS:}
  connect-timeout-seconds: ${HUGGINGFACE_CONNECT_TIMEOUT_SECONDS:10}
  read-timeout-seconds: ${HUGGINGFACE_READ_TIMEOUT_SECONDS:120}

mcp:
  enabled: ${MCP_ENABLED:true}
  command: ${MCP_COMMAND:node}
  args:
    - ${MCP_ARG_1:dist/index.js}
  working-directory: ${MCP_WORKING_DIRECTORY:mcp}
  startup-timeout-seconds: ${MCP_STARTUP_TIMEOUT_SECONDS:10}
  tool-timeout-seconds: ${MCP_TOOL_TIMEOUT_SECONDS:120}

rag:
  enabled: ${RAG_ENABLED:true}
  corpus-root: ${RAG_CORPUS_ROOT:docs}
  max-chunk-size: ${RAG_MAX_CHUNK_SIZE:900}
  chunk-overlap: ${RAG_CHUNK_OVERLAP:160}
  top-k: ${RAG_TOP_K:4}
  retrieval-mode: ${RAG_RETRIEVAL_MODE:lexical}
  vector-store: ${RAG_VECTOR_STORE:in-memory}
  qdrant-url: ${RAG_QDRANT_URL:http://localhost:6333}
  qdrant-collection: ${RAG_QDRANT_COLLECTION:local_genai_lab_docs}
  embedding-provider: ${RAG_EMBEDDING_PROVIDER:ollama}
  embedding-model: ${RAG_EMBEDDING_MODEL:nomic-embed-text}
  excluded-source-paths: ${RAG_EXCLUDED_SOURCE_PATHS:rag-evaluation-guide.md,rag-retrieval-evaluation-template.md}
