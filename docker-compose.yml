services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: llm-backend
    environment:
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3:8b}
      OLLAMA_CONNECT_TIMEOUT_SECONDS: ${OLLAMA_CONNECT_TIMEOUT_SECONDS:-10}
      OLLAMA_READ_TIMEOUT_SECONDS: ${OLLAMA_READ_TIMEOUT_SECONDS:-300}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: llm-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: llm-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
